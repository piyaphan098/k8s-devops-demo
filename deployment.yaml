apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-devops-demo
  labels:
    app: k8s-devops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-devops-demo
  template:
    metadata:
      labels:
        app: k8s-devops-demo
    spec:
      containers:
        - name: k8s-devops-demo
          image: piyaphan098/k8s-devops-demo:latest
          ports:
            - containerPort: 80
